<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web G-Bowl</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #main-container {
            display: flex;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 10px;
        }

        #left-pane, #right-pane {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #right-pane {
            flex-direction: column;
            gap: 15px;
        }

        @media screen and (orientation: portrait) {
            #main-container { flex-direction: column; }
            #left-pane { flex: 0 0 auto; margin-top: 10px; margin-bottom: 10px; }
            #right-pane { flex: 1 1 auto; justify-content: flex-start; }
            #canvas-container { width: 80vw; height: 80vw; max-width: 300px; max-height: 300px; }
        }

        @media screen and (orientation: landscape) {
            #main-container { flex-direction: row; }
            #left-pane { flex: 1 1 50%; }
            #right-pane { flex: 1 1 50%; }
            #canvas-container { width: 80vh; height: 80vh; max-width: 300px; max-height: 300px; }
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: #111;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            display: block;
        }

        .btn {
            background-color: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:active { background-color: #555; }

        /* 反転ボタン用の小さめスタイル */
        .btn-small {
            background-color: #222;
            color: #ccc;
            border: 1px solid #555;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-small.active {
            background-color: #1976d2; /* ONの時は青色に */
            color: #fff;
            border-color: #2196f3;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #start-btn {
            background-color: #d32f2f;
            border-color: #f44336;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 30px;
        }

        .info-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 20px;
        }

        .peak-panel {
            color: #ff9800;
            font-size: 18px;
        }

        .label {
            font-size: 12px;
            color: #aaa;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Web G-Bowl</h2>
        <p style="margin-bottom:30px; font-size:14px; color:#aaa;">※iOSの場合はモーションセンサーの許可が必要です</p>
        <button id="start-btn" class="btn" onclick="requestPermission()">計測スタート</button>
    </div>

    <div id="main-container">
        
        <div id="left-pane">
            <div id="canvas-container">
                <canvas id="gbowl-canvas" width="300" height="300"></canvas>
            </div>
        </div>

        <div id="right-pane">
            <div class="info-panel">
                <div><span class="label">X (左右)</span><span id="val-x">0.00</span> G</div>
                <div><span class="label">Y (前後)</span><span id="val-y">0.00</span> G</div>
            </div>

            <div class="peak-panel">
                <span class="label">PEAK G</span>
                <span id="val-peak">0.00</span> G
            </div>

            <div>
                <button class="btn" onclick="calibrate()">0点補正 (キャリブレーション)</button>
            </div>

            <div class="controls-row">
                <button id="btn-inv-x" class="btn-small" onclick="toggleInvertX()">左右反転: OFF</button>
                <button id="btn-inv-y" class="btn-small" onclick="toggleInvertY()">上下反転: OFF</button>
            </div>
        </div>

    </div>

    <script>
        // --- 設定値 ---
        const MAX_G = 1.0;          
        const ALPHA = 0.15;         

        // --- 変数 ---
        let currentX = 0, currentY = 0; 
        let offsetX = 0, offsetY = 0;   
        let peakG = 0;                  
        let isRunning = false;
        
        // 反転フラグ (1 = 通常, -1 = 反転)
        let invertX = 1;
        let invertY = 1;

        const canvas = document.getElementById('gbowl-canvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius1G = 140; 

        // --- センサー起動・許可 ---
        function requestPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startSensing();
                        } else {
                            alert("センサーの使用が許可されませんでした。");
                        }
                    })
                    .catch(e => {
                        alert("【エラー】HTTPS環境でないか、対応していません。\n詳細: " + e);
                    });
            } else {
                startSensing();
            }
        }

        function startSensing() {
            document.getElementById('overlay').style.display = 'none';
            if (!isRunning) {
                window.addEventListener('devicemotion', handleMotion, true);

                isRunning = true;
            }
        }

        // --- センサーデータの処理 ---
        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            let rawX = acc.x / 9.80665;
            let rawY = acc.y / 9.80665;

            // 画面の向きに対応して軸を補正
            let orient = window.orientation || 0;
            let adjX = rawX, adjY = rawY;
            if (orient === 90) { adjX = -rawY; adjY = rawX; }
            else if (orient === -90) { adjX = rawY; adjY = -rawX; }
            else if (orient === 180) { adjX = -rawX; adjY = -rawY; }

            // ローパスフィルタ適用
            currentX = currentX + ALPHA * (adjX - currentX);
            currentY = currentY + ALPHA * (adjY - currentY);
        }

        // --- キャリブレーション ---
        function calibrate() {
            offsetX = currentX;
            offsetY = currentY;
            peakG = 0; 
        }

        // --- 反転トグル処理 ---
