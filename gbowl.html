<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web G-Bowl</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden; /* スクロール防止 */
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #canvas-container {
            margin: 20px auto;
            width: 300px;
            height: 300px;
        }

        canvas {
            background-color: #111;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .btn {
            background-color: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }

        .btn:active {
            background-color: #555;
        }

        #start-btn {
            background-color: #d32f2f;
            border-color: #f44336;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 30px;
        }

        .info-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 20px;
            margin-top: 10px;
        }

        .peak-panel {
            color: #ff9800;
            font-size: 18px;
            margin-top: 5px;
        }

        .label {
            font-size: 12px;
            color: #aaa;
            display: block;
        }

        /* 📱 縦置き（ポートレート）時専用のレイアウト調整 */
        @media screen and (orientation: portrait) {
            body {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                height: 100dvh; /* iOS SafariなどのUIを除いた正確な表示領域 */
                box-sizing: border-box;
                padding: 10px 0;
            }
            #canvas-container {
                margin: 0 auto 15px auto;
                width: 80vw; /* 画面幅の80%に合わせて縮小 */
                height: 80vw;
                max-width: 300px;
                max-height: 300px;
            }
            canvas {
                width: 100%;
                height: 100%;
            }
            .info-panel {
                margin-top: 0;
                margin-bottom: 10px;
            }
            .peak-panel {
                margin-top: 0;
                margin-bottom: 15px;
            }
            .btn {
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Web G-Bowl</h2>
        <p style="margin-bottom:30px; font-size:14px; color:#aaa;">※iOSの場合はモーションセンサーの許可が必要です</p>
        <button id="start-btn" class="btn" onclick="requestPermission()">計測スタート</button>
    </div>

    <div id="canvas-container">
        <canvas id="gbowl-canvas" width="300" height="300"></canvas>
    </div>

    <div class="info-panel">
        <div><span class="label">X (左右)</span><span id="val-x">0.00</span> G</div>
        <div><span class="label">Y (前後)</span><span id="val-y">0.00</span> G</div>
    </div>

    <div class="peak-panel">
        <span class="label">PEAK G</span>
        <span id="val-peak">0.00</span> G
    </div>

    <div>
        <button class="btn" onclick="calibrate()">0点補正 (キャリブレーション)</button>
    </div>

    <script>
        // --- 設定値 ---
        const MAX_G = 1.0;          
        const ALPHA = 0.15;         

        // --- 変数 ---
        let currentX = 0, currentY = 0; 
        let offsetX = 0, offsetY = 0;   
        let peakG = 0;                  
        let isRunning = false;

        const canvas = document.getElementById('gbowl-canvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius1G = 140; 

        // --- センサー起動・許可 ---
        function requestPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startSensing();
                        } else {
                            alert("センサーの使用が許可されませんでした。");
                        }
                    })
                    .catch(console.error);
            } else {
                startSensing();
            }
        }

        function startSensing() {
            document.getElementById('overlay').style.display = 'none';
            if (!isRunning) {
                window.addEventListener('devicemotion', handleMotion, true);
                requestAnimationFrame(updateFrame);
                isRunning = true;
            }
        }

        // --- センサーデータの処理 ---
        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            let rawX = acc.x / 9.80665;
            let rawY = acc.y / 9.80665;

            let orient = window.orientation || 0;
            let adjX = rawX, adjY = rawY;
            if (orient === 90) { adjX = -rawY; adjY = rawX; }
            else if (orient === -90) { adjX = rawY; adjY = -rawX; }
            else if (orient === 180) { adjX = -rawX; adjY = -rawY; }

            currentX = currentX + ALPHA * (adjX - currentX);
            currentY = currentY + ALPHA * (adjY - currentY);
        }

        // --- キャリブレーション ---
        function calibrate() {
            offsetX = currentX;
            offsetY = currentY;
            peakG = 0; 
        }

        // --- 描画と数値更新 ---
        function updateFrame() {
            let dispX = currentX - offsetX;
            let dispY = currentY - offsetY;

            let currentG = Math.sqrt(dispX * dispX + dispY * dispY);
            if (currentG > peakG) {
                peakG = currentG;
            }

            document.getElementById('val-x').innerText = dispX.toFixed(2);
            document.getElementById('val-y').innerText = dispY.toFixed(2);
            document.getElementById('val-peak').innerText = peakG.toFixed(2);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawGuideCircle(0.3, '#333');
            drawGuideCircle(0.6, '#444');
            drawGuideCircle(1.0, '#555');

            ctx.strokeStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height);
            ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY);
            ctx.stroke();

            let ballPixelX = centerX - (dispX * radius1G);
            let ballPixelY = centerY - (dispY * radius1G);

            let dist = Math.sqrt(Math.pow(ballPixelX - centerX, 2) + Math.pow(ballPixelY - centerY, 2));
            if (dist > radius1G) {
                let ratio = radius1G / dist;
                ballPixelX = centerX + (ballPixelX - centerX) * ratio;
                ballPixelY = centerY + (ballPixelY - centerY) * ratio;
            }

            ctx.beginPath();
            ctx.arc(ballPixelX, ballPixelY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3333';
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 0; 

            requestAnimationFrame(updateFrame);
        }

        function drawGuideCircle(gValue, color) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius1G * (gValue / MAX_G), 0, Math.PI * 2);
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.fillStyle = '#666';
            ctx.font = "10px sans-serif";
            ctx.fillText(gValue.toFixed(1) + "G", centerX + 5, centerY - (radius1G * gValue) + 12);
        }
    </script>
</body>
</html>
